services:
  web:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./staticfiles:/app/staticfiles
    expose:
      - "8000"
    command: python manage.py runserver 0.0.0.0:8000

  bot:
    build: ./bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    volumes:
      - ./bot:/app
    depends_on:
      - web