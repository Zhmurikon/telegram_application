services:
  web:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app
      - static_files:/app/staticfiles
    expose:
      - "8000"

  bot:
    build: ./bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    depends_on:
      - web

volumes:
  sqlite_data:
  static_files: